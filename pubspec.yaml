name: gallery_cleaner
description: "Gallery Cleaner - Clean your gallery with ease"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.0-57.0.dev
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  photo_manager: ^3.2.0
  permission_handler: ^11.3.1
  animations: ^2.0.11
  path_provider: ^2.1.3
  logger: ^2.4.0
  intl: ^0.20.2
  lottie: ^3.1.0
  shared_preferences: ^2.3.3
  audioplayers: ^6.0.0
  google_mobile_ads: ^5.1.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/lottie/loading.json
    - assets/lottie/gallery_loading.json
    - assets/sound/delete.mp3
    - assets/sound/keep.mp3
    - assets/sound/scanner.mp3

flutter_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
